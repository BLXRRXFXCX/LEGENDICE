<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEGENDICE</title>

     <!-- Шрифт Press Start 2P -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <!-- Three.js для 3D кубиков -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- ГЛАВНЫЙ КОНТЕЙНЕР -->
    <div id="app">
        <!-- ЭКРАН ЗАГРУЗКИ -->
        <div id="loading-screen">
            <div class="loader"></div>
            <h1>🎲 LEGENDICE</h1>
            <p id="loading-status">Загрузка...</p>
        </div>

        <!-- ЭКРАН ЛОББИ -->
        <div id="lobby-screen" style="display:none;">
            <div class="lobby-container">
                <h1>🎲 LEGENDICE</h1>
                <div id="lobby-content">
                    <!-- Содержимое отрисовывается через JS -->
                </div>
            </div>
        </div>

        <!-- ЭКРАН ИГРЫ -->
        <div id="game-screen" style="display:none;">
            <!-- Верхняя панель -->
            <div id="top-bar">
                <div id="player1-info" class="player-info">👤 Игрок 1: ❤️ 20/20</div>
                <div id="player2-info" class="player-info">👤 Игрок 2: ❤️ 20/20</div>
                <div id="turn-indicator">⏳ Ожидание...</div>
            </div>

            <!-- КАРТА И КОМНАТА -->
            <div id="dungeon-container">
                <div id="minimap"></div>
                <div id="room-view">
                    <div style="color:#666; text-align:center; padding:40px;">
                        🏚️ Выберите комнату на карте
                    </div>
                </div>
            </div>

            <!-- СЛОТЫ -->
            <div id="slots-bar">
                <div class="slot-item">🧠<span class="slot-stat">-</span></div>
                <div class="slot-item">🤚<span class="slot-stat">-</span></div>
                <div class="slot-item">✋<span class="slot-stat">-</span></div>
                <div class="slot-item">🛡️<span class="slot-stat">-</span></div>
                <div class="slot-item">🦵<span class="slot-stat">-</span></div>
                <div class="slot-item">💍<span class="slot-stat">-</span></div>
            </div>

            <!-- ЧАТ -->
            <div id="chat-container">
                <div id="chat-messages">
                    <div style="color:#666; font-size:12px; text-align:center;">💬 Добро пожаловать в LEGENDICE!</div>
                </div>
                <div id="chat-input-container">
                    <input type="text" id="chat-input" placeholder="Сообщение..." maxlength="100">
                    <button id="chat-send">📤</button>
                </div>
                <div id="ping-bar">
                    <button class="ping-btn" data-emoji="⚠️">⚠️</button>
                    <button class="ping-btn" data-emoji="💎">💎</button>
                    <button class="ping-btn" data-emoji="🏃">🏃</button>
                    <button class="ping-btn" data-emoji="❤️">❤️</button>
                    <button class="ping-btn" data-emoji="🛑">🛑</button>
                </div>
            </div>

            <!-- КНОПКИ ДЕЙСТВИЙ -->
            <div id="action-bar">
                <button id="btn-inventory">📦 Инвентарь</button>
                <button id="btn-map">🗺️ Карта</button>
                <button id="btn-roll" class="btn-roll-main">🎲 Бросить</button>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО -->
        <div id="modal-overlay" style="display:none;">
            <div id="modal-content"></div>
        </div>

        <!-- 3D КОНТЕЙНЕР ДЛЯ КУБИКОВ -->
        <div id="dice-container" style="display:none;">
            <div id="dice-canvas-container"></div>
            <div id="dice-result" style="display:none;"></div>
            <button id="dice-close-btn" style="position:absolute; top:20px; right:20px; padding:10px 20px; border-radius:8px; border:none; background:#dc3545; color:#fff; font-weight:bold; cursor:pointer; z-index:10; display:none;">
                ✕ Закрыть
            </button>
        </div>
    </div>

    <!-- ПОДКЛЮЧЕНИЕ JS -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
